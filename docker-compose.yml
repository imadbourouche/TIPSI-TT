services:
  postgres:
    image: postgres:15
    container_name: sav_postgres
    environment:
      POSTGRES_DB: sav
      POSTGRES_USER: savuser
      POSTGRES_PASSWORD: savpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savuser -d sav"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. API Quarkus (Utilise le Dockerfile natif de Quarkus)
  api:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: sav_api
    ports:
      - "8080:8080"
    environment:
      # Connexion au service 'postgres' du réseau Docker
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/sav
      QUARKUS_DATASOURCE_USERNAME: savuser
      QUARKUS_DATASOURCE_PASSWORD: savpass
      QUARKUS_FLYWAY_MIGRATE_AT_START: true
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: validate
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
